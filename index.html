<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{--bg:#0d0b0e;--surface:#161218;--surface2:#1e1820;--border:rgba(255,255,255,0.07);--orange:#f05924;--blue:#84d1eb;--green:#34d399;--beige:#fcf6ec;--muted:#7a6e78;--dimmed:rgba(252,246,236,0.45);--radius:12px;--font:'Bricolage Grotesque',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--beige);font-family:var(--font);font-size:14px;min-height:100vh}
#app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app-loading p{color:var(--muted);font-size:13px}
#app{display:none}

/* Layout */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;transition:grid-template-columns .25s ease}
.layout.collapsed{grid-template-columns:0px 1fr}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;transition:transform .25s ease,width .25s ease;width:220px;z-index:10}
.layout.collapsed .sidebar{transform:translateX(-220px);width:0;border-right:none}
.sidebar-top{padding:1.25rem;border-bottom:1px solid var(--border);margin-bottom:.5rem;min-height:60px;display:flex;align-items:center}
.sidebar-top img{height:26px;width:auto;display:block;max-width:160px}
.logo-fallback{font-size:15px;font-weight:800;color:var(--orange);display:none}
.hamburger{position:fixed;top:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:background .15s,left .25s ease;left:228px}
.layout.collapsed .hamburger{left:14px}
.hamburger:hover{background:var(--surface2)}
.hamburger span{display:block;width:16px;height:2px;background:var(--muted);border-radius:2px}
.sidebar-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);padding:0 1.25rem;margin:1rem 0 .3rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sidebar-section:hover{color:var(--beige)}
.sidebar-section .chev{font-size:8px;transition:transform .2s;opacity:.5}
.sidebar-section.coll .chev{transform:rotate(-90deg)}
.year-group{overflow:hidden;transition:max-height .25s ease}
.year-group.coll{max-height:0!important}
.nav-tab{display:flex;align-items:center;gap:8px;padding:7px 1.25rem;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color .15s,background .15s;position:relative;font-family:var(--font);white-space:nowrap}
.nav-tab:hover{color:var(--beige);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--beige);background:rgba(240,89,36,.08)}
.nav-tab.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--orange);border-radius:0 2px 2px 0}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid var(--border)}
.temeron-badge{display:flex;align-items:center;gap:8px}
.temeron-logo{height:20px;width:auto;display:block}
.temeron-t{width:24px;height:24px;background:var(--orange);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0;display:none}
.temeron-name{font-size:12px;font-weight:700;color:var(--beige)}
.temeron-rights{font-size:10px;color:var(--muted);margin-top:1px}
.main{padding:2rem;overflow-x:hidden;padding-top:1.5rem}

/* Views */
.view{display:none}.view.active{display:block}

/* Page header */
.page-header{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.page-eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:4px}
.page-title{font-size:26px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}
.pills-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid}
.pill-dot{width:5px;height:5px;border-radius:50%}
.pill-total{border-color:rgba(255,255,255,.12);color:var(--beige);background:rgba(255,255,255,.05)}
.pill-c{border-color:rgba(132,209,235,.3);color:var(--blue);background:rgba(132,209,235,.08)}
.pill-r{border-color:rgba(240,89,36,.3);color:var(--orange);background:rgba(240,89,36,.08)}
.pill-i{border-color:rgba(247,178,79,.3);color:#f7b24f;background:rgba(247,178,79,.08)}
.pill-s{border-color:rgba(196,176,253,.3);color:#c4b0fd;background:rgba(196,176,253,.08)}

/* Month tabs */
.month-tabs{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0}
.mtab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.mtab:hover{color:var(--beige)}
.mtab.active{color:var(--beige);border-bottom-color:var(--orange)}
.tab-content{display:none}.tab-content.active{display:block}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1.25rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kpi-line,var(--orange));opacity:.5}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;font-weight:700}
.kpi-val{font-size:24px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.charts-row{display:grid;grid-template-columns:1fr 300px;gap:10px;margin-bottom:1.25rem}
.right-panel{display:flex;flex-direction:column;gap:10px}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-weight:600}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}

/* Best post card */
.best-card{background:var(--surface);border:1px solid rgba(240,89,36,.25);border-radius:var(--radius);padding:1.25rem;position:relative;overflow:hidden}
.best-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange)}
.best-eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.best-eyebrow::before{content:'';width:4px;height:4px;background:var(--orange);border-radius:50%;display:inline-block}
.best-title{font-size:13px;font-weight:700;color:var(--beige);line-height:1.4;margin-bottom:3px}
.best-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.best-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;font-weight:600;margin-bottom:8px}
.best-link:hover{opacity:.7}
.best-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.best-stat{background:rgba(255,255,255,.04);border-radius:8px;padding:8px;text-align:center}
.best-stat-val{font-size:16px;font-weight:800;color:var(--orange);letter-spacing:-.03em}
.best-stat-label{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600}

/* Engagement bars */
.eng-list{display:flex;flex-direction:column;gap:10px}
.eng-row{display:flex;align-items:center;gap:8px}
.eng-name{font-size:11px;color:var(--muted);width:74px;flex-shrink:0;text-align:right;font-weight:600}
.eng-bar-bg{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.eng-bar{height:100%;border-radius:99px}
.eng-num{font-size:11px;font-weight:800;color:var(--beige);width:32px;flex-shrink:0;text-align:right}

/* Account data */
.acct-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.acct-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.acct-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;font-weight:700}
.acct-val{font-size:20px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.acct-sub{font-size:10px;color:var(--muted);margin-top:3px}
.acct-pos{color:var(--green)}.acct-neg{color:var(--orange)}

/* Weekday */
.weekday-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1.25rem}
.weekday-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center}
.weekday-card.wd-best{border-color:rgba(132,209,235,.4);background:rgba(132,209,235,.05)}
.weekday-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.weekday-card.wd-best .weekday-name{color:var(--blue)}
.weekday-views{font-size:16px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.weekday-card.wd-best .weekday-views{color:var(--blue)}
.weekday-posts{font-size:10px;color:var(--muted);margin-top:3px}
.weekday-eng{font-size:10px;font-weight:700;color:var(--muted);margin-top:4px}
.weekday-bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:99px;margin-top:6px;overflow:hidden}
.weekday-bar{height:100%;border-radius:99px;background:rgba(255,255,255,.15)}
.weekday-card.wd-best .weekday-bar{background:var(--blue)}

/* Posts - compact horizontal cards */
.posts-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.post-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:60px 1fr auto;gap:12px;align-items:center;text-decoration:none;transition:border-color .15s;overflow:hidden}
.post-row:hover{border-color:rgba(240,89,36,.3)}
.post-row-img{width:60px;height:60px;object-fit:cover;display:block;background:var(--surface2);flex-shrink:0}
.post-row-embed{width:60px;height:60px;overflow:hidden;background:var(--surface2);flex-shrink:0}
.post-row-embed iframe{width:200%;height:200%;transform:scale(.5);transform-origin:top left;border:none}
.post-row-ph{width:60px;height:60px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.3;flex-shrink:0}
.post-row-body{padding:10px 0;min-width:0}
.post-row-rank{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);margin-bottom:3px}
.post-row-desc{font-size:12px;color:var(--dimmed);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.post-row-meta{font-size:11px;color:var(--muted);font-weight:600}
.post-row-stats{padding:10px 14px 10px 0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.post-row-views{font-size:14px;font-weight:800;color:var(--beige);letter-spacing:-.02em}
.post-row-views span{font-size:10px;font-weight:500;color:var(--muted)}

/* Format sections */
.format-section{margin-bottom:1.5rem}
.format-header{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.format-title{font-size:13px;font-weight:700;color:var(--beige)}
.format-count{font-size:11px;color:var(--muted)}

/* Posts groups (top/worst) */
.posts-group{border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.posts-group-top{background:rgba(132,209,235,0.04);border:1px solid rgba(132,209,235,0.1)}
.posts-group-worst{background:rgba(240,89,36,0.04);border:1px solid rgba(240,89,36,0.1)}
.posts-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.posts-group-title{font-size:15px;font-weight:800;letter-spacing:-.02em}
.posts-group-title-top{color:var(--blue)}
.posts-group-title-worst{color:var(--muted)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--beige);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
tr.top-row td{background:rgba(240,89,36,.04)}
.num{text-align:right!important}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;white-space:nowrap}
.badge-c{background:rgba(132,209,235,.12);color:#84d1eb}
.badge-r{background:rgba(240,89,36,.12);color:#f07a55}
.badge-i{background:rgba(252,246,236,.08);color:rgba(252,246,236,.55)}
.badge-s{background:rgba(196,176,253,.12);color:#c4b0fd}
.eng-pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:700}
.eng-h{background:rgba(240,89,36,.15);color:var(--orange)}
.eng-m{background:rgba(132,209,235,.12);color:var(--blue)}
.eng-l{color:var(--muted)}
.star{color:var(--orange);margin-right:3px;font-size:10px}
.desc-cell{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dimmed)}
.ig-link{color:var(--blue);text-decoration:none;font-size:11px;font-weight:600}

/* Demographics */
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.demo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.demo-label{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;text-align:right}
.demo-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.demo-bar-f{height:100%;background:#f05924;border-radius:99px}
.demo-bar-m{height:100%;background:#84d1eb;border-radius:99px}
.demo-val{font-size:11px;font-weight:700;color:var(--beige);width:36px;text-align:right}
.top-list{display:flex;flex-direction:column;gap:6px}
.top-list-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.top-list-name{color:var(--dimmed)}
.top-list-val{font-weight:700;color:var(--beige)}

/* Annual */
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.ms-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:border-color .15s}
.ms-card:hover{border-color:rgba(240,89,36,.3)}
.ms-name{font-size:13px;font-weight:700;color:var(--beige);margin-bottom:4px}
.ms-views{font-size:20px;font-weight:800;color:var(--beige);letter-spacing:-.03em}
.ms-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px}
.ms-row{display:flex;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.ms-val{font-weight:700;color:var(--beige)}

/* Misc */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:.75rem;text-align:center}
.empty-wrap .et{font-size:16px;font-weight:700;color:var(--beige)}
.empty-wrap p{color:var(--muted);font-size:13px;max-width:340px;line-height:1.6}
code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:12px}
.section-gap{margin-bottom:1.25rem}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.annual-grid{grid-template-columns:repeat(2,1fr)}.demo-grid{grid-template-columns:1fr}}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:.5rem;border-right:none;border-bottom:1px solid var(--border)}.sidebar-top{padding:.5rem .75rem;border-bottom:none;margin-bottom:0;min-height:auto}.sidebar-section{display:none}.nav-tab{padding:5px 10px;border-radius:99px;border:1px solid var(--border);font-size:12px}.nav-tab.active{background:rgba(240,89,36,.12);border-color:rgba(240,89,36,.3)}.nav-tab.active::before{display:none}.sidebar-footer{display:none}.main{padding:1rem;padding-top:1rem}.kpi-grid{grid-template-columns:repeat(2,1fr)}.annual-grid{grid-template-columns:1fr 1fr}.hamburger{display:none}}
</style>
</head>
<body>
<div id="app-loading"><div class="spinner"></div><p>Carregando dados...</p></div>
<div id="app">
  <button class="hamburger" id="hamburger" title="Menu"><span></span><span></span><span></span></button>
  <div class="layout" id="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <img src="logo.png" alt="SetUp" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="logo-fallback">SetUp</span>
      </div>
      <div class="sidebar-section">Mensal</div>
      <div id="monthNav"></div>
      <button class="nav-tab" id="btn-annual" style="display:none"></button>
      <div class="sidebar-footer">
        <div class="temeron-badge">
          <img class="temeron-logo" src="temeron-logo.png" alt="Temeron" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="temeron-t">T</div>
          <div>
            <div class="temeron-name">Temeron<sup style="font-size:8px">®</sup></div>
            <div class="temeron-rights">© 2026 Todos os direitos reservados.</div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main" id="mainContent"></main>
  </div>
</div>
<script>
/* ── Constants ── */
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const WEEKDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

/* ── Helpers ── */
const fmt=n=>(isNaN(n)||n==null)?'—':Number(n).toLocaleString('pt-BR');
function parsePostDate(s){
  if(!s)return null;
  const parts=s.trim().split(' ');
  const p=(parts[0]||'').split('/');
  if(p.length<3)return null;
  const rawTime=parts[1]||'00:00';
  const[hStr,mStr]=(rawTime+':00').split(':');
  let h=parseInt(hStr,10),m=parseInt(mStr,10);
  const d=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]),h+5,m);
  return{date:d,time:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`};
}
function postDateLine(s){const r=parsePostDate(s);if(!r)return'';const{date,time}=r;return`${WEEKDAYS[date.getDay()]} · ${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')} · ${time}`;}
function fmtD(s){const r=parsePostDate(s);if(!r)return'—';return`${String(r.date.getDate()).padStart(2,'0')}/${String(r.date.getMonth()+1).padStart(2,'0')}/${String(r.date.getFullYear()).slice(-2)} às ${r.time}`;}
function sDate(s){const r=parsePostDate(s);if(!r)return'—';return`${String(r.date.getDate()).padStart(2,'0')} ${MS[r.date.getMonth()]}`;}
function tKey(t){const s=(t||'').toLowerCase();if(s.includes('carrossel'))return'c';if(s.includes('reel'))return'r';if(s.includes('story')||s.includes('storie'))return's';return'i'}
function sTipo(t){return{c:'Carrossel',r:'Reel',i:'Imagem',s:'Story'}[tKey(t)]}
function bCls(t){return{c:'badge-c',r:'badge-r',i:'badge-i',s:'badge-s'}[tKey(t)]}
function bColor(t){return{c:'#84d1eb',r:'#f05924',i:'rgba(252,246,236,.3)',s:'#c4b0fd'}[tKey(t)]}
function ePill(p){if(p>=5)return`<span class="eng-pill eng-h">${p.toFixed(1)}%</span>`;if(p>=2)return`<span class="eng-pill eng-m">${p.toFixed(1)}%</span>`;return`<span class="eng-l">${p.toFixed(1)}%</span>`}
function sc(url){if(!url)return null;const m=url.match(/\/(?:p|reel)\/([A-Za-z0-9_-]+)/);return m?m[1]:null}
function sum(arr,k){return arr.reduce((a,r)=>a+(parseInt(r[k],10)||0),0)}
function parsePosts(rows){return rows.filter(r=>(r['Data']||'').trim()==='Total')}
function pillLabel(k,n){return{c:n===1?'Carrossel':'Carrosseis',r:'Reels',i:n===1?'Post':'Posts',s:n===1?'Story':'Stories'}[k]}

/* ── Post image block ── */
function imgBlock(shortcode,postUrl){

/* ── Compact post row ── */
function postRowHtml(p,rank,rankLabel,rankColor){
  const code=sc(p['Link permanente']||'');
  const v=parseInt(p['Visualizações'],10)||0;
  const l=parseInt(p['Curtidas'],10)||0,sh=parseInt(p['Compartilhamentos'],10)||0,co=parseInt(p['Comentários'],10)||0,sv=parseInt(p['Salvamentos'],10)||0;
  const eng=v>0?(l+sh+co+sv)/v*100:0;
  const desc=(p['Descrição']||'').split('\n')[0].trim();
  const url=p['Link permanente']||'#';
  const color=rankColor||'var(--orange)';
  return`<a class="post-row" href="${url}" target="_blank" rel="noopener">
    ${imgBlock(code,url)}
    <div class="post-row-body">
      ${rank?`<div class="post-row-rank" style="color:${color}">${rank}</div>`:''}
      <div class="post-row-desc">${desc}</div>
      <div class="post-row-meta">${postDateLine(p['Horário de publicação'])} · <span class="badge ${bCls(p['Tipo de post'])}">${sTipo(p['Tipo de post'])}</span></div>
    </div>
    <div class="post-row-stats">
      <div class="post-row-views">${fmt(v)} <span>views</span></div>
      ${ePill(eng)}
    </div>
  </a>`;
}

/* ── Posts by format ── */
function postsByFormat(posts){
  const formats=[
    {key:'c',label:'Carrosseis',color:'#84d1eb'},
    {key:'r',label:'Reels',color:'#f05924'},
    {key:'i',label:'Imagens',color:'#f7b24f'},
    {key:'s',label:'Stories',color:'#c4b0fd'},
  ];
  return formats.map(f=>{
    const fp=posts.filter(p=>tKey(p['Tipo de post'])===f.key).sort((a,b)=>(parseInt(b['Visualizações'],10)||0)-(parseInt(a['Visualizações'],10)||0));
    if(!fp.length)return'';
    const ranks=['1º','2º','3º'];
    return`<div class="format-section">
      <div class="format-header">
        <div class="format-title" style="color:${f.color}">${f.label}</div>
        <div class="format-count">${fp.length} publicação${fp.length!==1?'ões':''}</div>
      </div>
      <div class="posts-list">${fp.map((p,i)=>postRowHtml(p,ranks[i]||null,null,f.color)).join('')}</div>
    </div>`;
  }).join('');
}

    const eng=v>0?(l+sh+co+sv)/v*100:0;

/* ── Weekday analysis ── */
function weekdayAnalysis(posts){
  const stats=Array.from({length:7},()=>({views:0,likes:0,shares:0,comments:0,saves:0,count:0}));
  posts.forEach(p=>{
    const r=parsePostDate(p['Horário de publicação']);if(!r)return;
    const d=r.date.getDay();
    stats[d].views+=(parseInt(p['Visualizações'],10)||0);stats[d].likes+=(parseInt(p['Curtidas'],10)||0);
    stats[d].shares+=(parseInt(p['Compartilhamentos'],10)||0);stats[d].comments+=(parseInt(p['Comentários'],10)||0);
    stats[d].saves+=(parseInt(p['Salvamentos'],10)||0);stats[d].count++;
  });
  const maxViews=Math.max(...stats.map(s=>s.views),1);
  const bestIdx=stats.reduce((bi,s,i)=>s.views>stats[bi].views?i:bi,0);
  return`<div class="weekday-grid">${WEEKDAYS.map((name,i)=>{
    const s=stats[i];const eng=s.views>0?((s.likes+s.shares+s.comments+s.saves)/s.views*100):0;
    const isBest=i===bestIdx&&s.count>0;const avgViews=s.count>0?Math.round(s.views/s.count):0;
    return`<div class="weekday-card${isBest?' wd-best':''}">
      <div class="weekday-name">${name}</div>
      <div class="weekday-views">${s.count>0?fmt(avgViews):'—'}</div>
      <div class="weekday-posts">${s.count} post${s.count!==1?'s':''}</div>
      <div class="weekday-eng">${s.count>0?eng.toFixed(1)+'%':'—'}</div>
      <div class="weekday-bar-wrap"><div class="weekday-bar" style="width:${(s.views/maxViews*100).toFixed(1)}%"></div></div>
    </div>`;
  }).join('')}</div>`;
}

/* ── Build annual view ── */
function buildAnnual(yearMonths,year,acctMap){

/* ── Metric CSV fetching ── */
async function fetchMetricCsv(year,mo,name){
  try{
    const url=`data/${year}/${mo}/${name}.csv`;
    const r=await fetch(url);if(!r.ok)return null;
    const buf=await r.arrayBuffer();
    const text=new TextDecoder('utf-16').decode(buf);
    const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
    const dataLines=lines.filter(l=>l.includes(',')&&!l.startsWith('sep='));
    if(dataLines.length<2)return null;
    const parsed=Papa.parse(dataLines.join('\n'),{header:true,skipEmptyLines:true});
    return parsed.data;
  }catch(e){return null}
}

async function fetchPublicoCsv(year,mo){
  try{
    const r=await fetch(`data/${year}/${mo}/Público.csv`);if(!r.ok)return null;
    const buf=await r.arrayBuffer();
    const text=new TextDecoder('utf-16').decode(buf);
    const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim()).filter(l=>!l.startsWith('sep='));
    // Age/gender section: lines with pattern like 18-24 or header with Mulheres/Homens
    const ages=[];
    const agePattern=/^\d{2}[-+]/;
    for(const line of lines){
      const cols=line.split(',').map(c=>c.replace(/"/g,'').trim());
      if(agePattern.test(cols[0])){
        ages.push({range:cols[0],f:parseFloat(cols[1])||0,m:parseFloat(cols[2])||0});
      }
    }
    // Countries and cities: rows with multiple values without age pattern
    const countries=[];const cities=[];
    let i=0;
    while(i<lines.length){
      const cols=lines[i].split(',').map(c=>c.replace(/"/g,'').trim());
      // Detect country row: multiple items, no age pattern, no header keywords
      if(cols.length>=3&&!agePattern.test(cols[0])&&cols[0]&&!cols[0].includes('Mulheres')&&!cols[0].includes('Faixa')){
        // Could be names row - check if next row has numbers
        if(i+1<lines.length){
          const nextCols=lines[i+1].split(',').map(c=>c.replace(/"/g,'').trim());
          if(nextCols.every(c=>!isNaN(parseFloat(c)))){
            // This is names row, next is percentages
            const names=cols;const pcts=nextCols.map(c=>parseFloat(c)||0);
            const isCity=names.some(n=>/,\s*(SP|RJ|MG|RS|PR|BA|SC|GO|CE|PE)/.test(n));
            names.forEach((n,idx)=>{if(n&&pcts[idx]){(isCity?cities:countries).push({name:n,pct:pcts[idx]})}});
            i+=2;continue;
          }
        }
      }
      i++;
    }
    return{ages,countries,cities};
  }catch(e){return null}
}

/* ── Tab switching ── */
function showTab(key,tab){
  const view=document.getElementById(`view-${key}`);if(!view)return;
  view.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  view.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  const activeTab=view.querySelector(`.mtab[onclick*="'${tab}'"]`);
  const activeContent=document.getElementById(`tab-${key}-${tab}`);
  if(activeTab)activeTab.classList.add('active');
  if(activeContent)activeContent.classList.add('active');
  // Trigger chart rendering for this tab
  if(tab==='geral'){renderMonthChartsGeral(key);}
  if(tab==='publico'){renderPublicoTab(key);}
}

/* ── Navigation ── */
let currentView=null;
let allMonths=[];

function showView(vid){
  if(currentView===vid)return;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const view=document.getElementById(vid);if(view)view.classList.add('active');
  const tab=document.querySelector(`[data-view="${vid}"]`);if(tab)tab.classList.add('active');
  currentView=vid;
  if(vid.startsWith('view-')&&!vid.startsWith('view-annual')){
    const key=vid.replace('view-','');
    renderMonthChartsGeral(key);
  } else if(vid.startsWith('view-annual-')){
    const y=parseInt(vid.replace('view-annual-',''));
    const yMonths=allMonths.filter(m=>m.year===y);
    mkChart(`ch-annual-${y}`,{type:'bar',data:{labels:yMonths.map(m=>MO[m.mi].slice(0,3)),datasets:[{label:'Views',data:yMonths.map(m=>sum(m.posts,'Visualizações')),backgroundColor:'#f05924',borderRadius:4,borderSkipped:false},{label:'Alcance',data:yMonths.map(m=>sum(m.posts,'Alcance')),backgroundColor:'#84d1eb',borderRadius:3,borderSkipped:false}]},options:{...cOpts(),plugins:{...cOpts().plugins,legend:{display:false}}}});
    // Follower chart
    const follData=yMonths.map(m=>({label:MO[m.mi].slice(0,3),seg:parseFloat((window.acctMap?.[m.key]||{})['Total seguidores'])||null})).filter(d=>d.seg!==null);
    if(follData.length&&document.getElementById(`ch-annual-foll-${y}`)){
      // Linear trend
      const n=follData.length;const xs=follData.map((_,i)=>i);const ys=follData.map(d=>d.seg);
      const sumX=xs.reduce((a,b)=>a+b,0),sumY=ys.reduce((a,b)=>a+b,0);
      const sumXY=xs.reduce((a,x,i)=>a+x*ys[i],0),sumX2=xs.reduce((a,x)=>a+x*x,0);
      const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX||1);
      const intercept=(sumY-slope*sumX)/n;
      const trendData=xs.map(x=>Math.round(slope*x+intercept));
      mkChart(`ch-annual-foll-${y}`,{type:'line',data:{labels:follData.map(d=>d.label),datasets:[{label:'Seguidores',data:follData.map(d=>d.seg),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.08)',borderWidth:2,fill:true,tension:.4,pointRadius:3},{label:'Tendência',data:trendData,borderColor:'rgba(52,211,153,.4)',borderDash:[4,4],borderWidth:1.5,fill:false,tension:0,pointRadius:0}]},options:{...cOpts(),plugins:{...cOpts().plugins,legend:{display:false}}}});
    }
  }
}

/* ── Init ── */
(async function init(){
  const now=new Date();const thisYear=now.getFullYear();

  function splitByMonth(posts){
    const byKey={};
    posts.forEach(p=>{
      const h=p['Horário de publicação']||'';const parts=h.split(' ')[0].split('/');if(parts.length<3)return;
      const y=parseInt(parts[2]),mo=parseInt(parts[0])-1;
      const key=`${y}-${String(mo+1).padStart(2,'0')}`;
      if(!byKey[key])byKey[key]={mi:mo,year:y,key,posts:[]};byKey[key].posts.push(p);
    });
    return Object.values(byKey);
  }

  // 1a. Monthly CSVs: data/YYYY/MM/YYYY-MM.csv
  const candidates=[];
  [thisYear-1,thisYear].forEach(y=>{for(let i=0;i<12;i++){const mo=String(i+1).padStart(2,'0');candidates.push({year:y,mi:i,key:`${y}-${mo}`,mo});}});
  const monthlyFetches=candidates.map(({year,mi,key,mo})=>
    fetch(`data/${year}/${mo}/${key}.csv`).then(r=>r.ok?r.text():null).catch(()=>null).then(text=>{
      if(!text)return null;
      const posts=parsePosts(Papa.parse(text,{header:true,skipEmptyLines:true}).data);
      return posts.length?{mi,year,key,mo,posts}:null;
    })
  );

  // 1b. Multi-month: data/YYYY/YYYY-MM-MM.csv
  const multiCandidates=[];
  [thisYear-1,thisYear].forEach(y=>{for(let f=1;f<=12;f++){for(let t=f+1;t<=12;t++){multiCandidates.push({y,key:`${y}-${String(f).padStart(2,'0')}-${String(t).padStart(2,'0')}`});}}});
  const multiFetches=multiCandidates.map(({y,key})=>
    fetch(`data/${y}/${key}.csv`).then(r=>r.ok?r.text():null).catch(()=>null).then(text=>{
      if(!text)return null;const all=parsePosts(Papa.parse(text,{header:true,skipEmptyLines:true}).data);
      return all.length?splitByMonth(all):null;
    })
  );

  const[monthlyRaw,multiRaw]=await Promise.all([Promise.all(monthlyFetches),Promise.all(multiFetches)]);
  const seen=new Set();const results=[];
  monthlyRaw.filter(Boolean).forEach(m=>{if(!seen.has(m.key)){seen.add(m.key);results.push(m);}});
  multiRaw.filter(Boolean).forEach(months=>{months.forEach(m=>{if(!seen.has(m.key)){seen.add(m.key);m.mo=m.key.split('-')[1];results.push(m);}});});
  results.sort((a,b)=>a.key.localeCompare(b.key));

  if(!results.length){
    document.getElementById('app-loading').innerHTML=`<div class="empty-wrap"><div class="et">Nenhum dado encontrado</div><p>Suba os arquivos CSV em <code>data/2026/03/2026-03.csv</code></p></div>`;return;
  }

  // 2. Dados gerais
  const years=[...new Set(results.map(m=>m.year))].sort();
  const acctMap={};
  try{
    const res=await fetch('data/dados_gerais.xlsx');
    if(res.ok){
      const ab=await res.arrayBuffer();const workbook=XLSX.read(ab,{type:'array'});
      workbook.SheetNames.forEach(sheetName=>{
        const y=parseInt(sheetName,10);if(isNaN(y))return;
        const worksheet=workbook.Sheets[sheetName];
        const data=XLSX.utils.sheet_to_json(worksheet,{defval:''});
        data.forEach(row=>{
          if(!row['Mês'])return;
          const mi=MO.findIndex(m=>m.toLowerCase()===row['Mês'].trim().toLowerCase());
          if(mi!==-1){const key=`${y}-${String(mi+1).padStart(2,'0')}`;acctMap[key]=row;}
        });
      });
    }
  }catch(e){}
  window.acctMap=acctMap;

  // 3. Check which months have metric files
  const hasMetricsMap={};
  await Promise.all(results.map(async m=>{
    const mo=(m.mo||m.key.split('-')[1]).padStart(2,'0');
    const r=await fetch(`data/${m.year}/${mo}/Visualizações.csv`).catch(()=>({ok:false}));
    hasMetricsMap[m.key]=r.ok;
    // Pre-fetch metrics for months that have them
    if(r.ok){
      const[views,reach,followers]=await Promise.all([
        fetchMetricCsv(m.year,mo,'Visualizações'),
        fetchMetricCsv(m.year,mo,'Alcance'),
        fetchMetricCsv(m.year,mo,'Seguidores'),
      ]);
      metricsCache[m.key]={views,reach,followers};
    }
  }));

  // 4. Build nav
  allMonths=results;const multiYear=years.length>1;
  const currentNow=new Date();const currentKey=`${currentNow.getFullYear()}-${String(currentNow.getMonth()+1).padStart(2,'0')}`;
  const bestKeyPerYear={};
  years.forEach(y=>{const yM=results.filter(m=>m.year===y);const b=yM.reduce((a,b)=>sum(b.posts,'Visualizações')>sum(a.posts,'Visualizações')?b:a,yM[0]);if(b)bestKeyPerYear[y]=b.key;});
  function dotColor(key){const isCurr=key===currentKey;const y=parseInt(key.split('-')[0]);const isBest=bestKeyPerYear[y]===key;if(isBest)return'var(--orange)';if(isCurr)return'var(--blue)';return'rgba(255,255,255,.2)';}

  const nav=document.getElementById('monthNav');
  years.forEach(y=>{
    const yDiv=document.createElement('div');yDiv.className='sidebar-section';yDiv.innerHTML=`${y} <span class="chev">▼</span>`;nav.appendChild(yDiv);
    const group=document.createElement('div');group.className='year-group';
    results.filter(m=>m.year===y).forEach(m=>{
      const btn=document.createElement('button');btn.className='nav-tab';btn.dataset.view=`view-${m.key}`;
      btn.innerHTML=`<span class="nav-dot" style="background:${dotColor(m.key)}"></span>${MO[m.mi]}`;
      btn.onclick=()=>showView(`view-${m.key}`);group.appendChild(btn);
    });
    nav.appendChild(group);
    group.style.maxHeight=group.scrollHeight+'px';
    yDiv.addEventListener('click',()=>{const c=group.classList.toggle('coll');yDiv.classList.toggle('coll',c);if(!c)group.style.maxHeight=group.scrollHeight+'px';});
  });

  const geralDiv=document.createElement('div');geralDiv.className='sidebar-section';geralDiv.textContent='Geral';
  document.querySelector('.sidebar').insertBefore(geralDiv,document.getElementById('btn-annual'));
  years.forEach(y=>{
    const btn=document.createElement('button');btn.className='nav-tab';btn.dataset.view=`view-annual-${y}`;
    btn.innerHTML=`<span class="nav-dot" style="background:var(--orange)"></span>${y}`;
    btn.onclick=()=>showView(`view-annual-${y}`);
    document.querySelector('.sidebar').insertBefore(btn,document.getElementById('btn-annual'));
  });

  // 5. Build HTML
  let html='';
  results.forEach(m=>{
    const b=buildMonth(m.mi,m.posts,m.key,m.year,multiYear,acctMap[m.key]||null,hasMetricsMap[m.key]||false);
    html+=b.html;monthChronoMap[m.key]=b.chrono;
  });
  const byYear={};results.forEach(m=>{if(!byYear[m.year])byYear[m.year]=[];byYear[m.year].push(m);});
  years.forEach(y=>{html+=buildAnnual(byYear[y],y,acctMap);});
  document.getElementById('mainContent').innerHTML=html;

  // 6. Hamburger
  document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('layout').classList.toggle('collapsed'));

  document.getElementById('app-loading').style.display='none';
  document.getElementById('app').style.display='block';
  showView(`view-annual-${years[years.length-1]}`);
})();
</script>
<script>
(function(){
  const img=new Image();
  img.onload=function(){
    const c=document.createElement('canvas');c.width=64;c.height=64;
    const ctx=c.getContext('2d');ctx.beginPath();ctx.arc(32,32,32,0,Math.PI*2);ctx.closePath();ctx.clip();ctx.drawImage(img,0,0,64,64);
    const link=document.querySelector("link[rel='icon']")||document.createElement('link');
    link.rel='icon';link.href=c.toDataURL('image/png');document.head.appendChild(link);
  };img.src='favicon.png';
})();
</script>
