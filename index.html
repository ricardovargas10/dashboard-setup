<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Temeron</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const CLIENT_NAME = 'SetUp English School';
  const ACCOUNT     = 'setup.english';
</script>
<style>
:root{--bg:#0d0b0e;--surface:#161218;--surface2:#1e1820;--border:rgba(255,255,255,0.07);--orange:#f05924;--blue:#84d1eb;--beige:#fcf6ec;--muted:#7a6e78;--dimmed:rgba(252,246,236,0.45);--radius:12px;--font:'Bricolage Grotesque',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--beige);font-family:var(--font);font-size:14px;min-height:100vh}
#app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app-loading p{color:var(--muted);font-size:13px}
#app{display:none}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:0 1.25rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.sidebar-logo img{height:28px;width:auto;display:block}
.logo-fallback{font-size:16px;font-weight:800;color:var(--orange);display:none}
.sidebar-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);padding:0 1.25rem;margin:1rem 0 .4rem}
.nav-tab{display:flex;align-items:center;gap:8px;padding:8px 1.25rem;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color .15s,background .15s;position:relative;font-family:var(--font)}
.nav-tab:hover{color:var(--beige);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--beige);background:rgba(240,89,36,.08)}
.nav-tab.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--orange);border-radius:0 2px 2px 0}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:1.25rem;border-top:1px solid var(--border)}
.temeron-badge{display:flex;align-items:center;gap:10px}
.temeron-t{width:28px;height:28px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0}
.temeron-logo{height:22px;width:auto;display:block}
.temeron-name{font-size:13px;font-weight:700;color:var(--beige)}
.temeron-rights{font-size:11px;color:var(--muted);margin-top:1px}
.main{padding:2rem;overflow-x:hidden}
.view{display:none}
.view.active{display:block}
.page-header{margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.page-eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:5px}
.page-title{font-size:28px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.page-sub{font-size:13px;color:var(--muted);margin-top:5px}
.pills-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid}
.pill-dot{width:6px;height:6px;border-radius:50%}
.pill-total{border-color:rgba(255,255,255,.12);color:var(--beige);background:rgba(255,255,255,.05)}
.pill-c{border-color:rgba(132,209,235,.3);color:var(--blue);background:rgba(132,209,235,.08)}
.pill-r{border-color:rgba(240,89,36,.3);color:var(--orange);background:rgba(240,89,36,.08)}
.pill-i{border-color:rgba(247,178,79,.3);color:#f7b24f;background:rgba(247,178,79,.08)}
.pill-s{border-color:rgba(196,176,253,.3);color:#c4b0fd;background:rgba(196,176,253,.08)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kpi-line,var(--orange));opacity:.5}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;font-weight:700}
.kpi-val{font-size:26px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.charts-row{display:grid;grid-template-columns:1fr 340px;gap:12px;margin-bottom:1.25rem}
.right-panel{display:flex;flex-direction:column;gap:12px}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600}
.legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.best-card{background:var(--surface);border:1px solid rgba(240,89,36,.25);border-radius:var(--radius);padding:1.25rem;position:relative;overflow:hidden}
.best-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange)}
.best-eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.best-eyebrow::before{content:'';width:5px;height:5px;background:var(--orange);border-radius:50%;display:inline-block}
.best-title{font-size:13px;font-weight:700;color:var(--beige);line-height:1.4;margin-bottom:3px}
.best-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.best-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;font-weight:600;margin-bottom:10px}
.best-link:hover{opacity:.7}
.best-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.best-stat{background:rgba(255,255,255,.04);border-radius:8px;padding:8px;text-align:center}
.best-stat-val{font-size:18px;font-weight:800;color:var(--orange);letter-spacing:-.03em}
.best-stat-label{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600}
.eng-list{display:flex;flex-direction:column;gap:12px}
.eng-row{display:flex;align-items:center;gap:10px}
.eng-name{font-size:11px;color:var(--muted);width:76px;flex-shrink:0;text-align:right;font-weight:600}
.eng-bar-bg{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.eng-bar{height:100%;border-radius:99px}
.eng-num{font-size:12px;font-weight:800;color:var(--beige);width:36px;flex-shrink:0;text-align:right}
.top-posts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.top-post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s;text-decoration:none;display:block}
.top-post-card:hover{border-color:rgba(240,89,36,.4)}
.top-post-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--surface2)}
.top-post-embed{width:100%;aspect-ratio:4/5;overflow:hidden;background:var(--surface2)}
.top-post-embed iframe{width:100%;height:100%;border:none;display:block}
.top-post-body{padding:14px 16px}
.top-post-rank{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);margin-bottom:5px}
.top-post-desc{font-size:14px;color:var(--dimmed);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px}
.top-post-stats{display:flex;gap:10px;font-size:14px;font-weight:700;color:var(--beige)}
.top-post-stats span{color:var(--muted);font-weight:500}
.posts-group{border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.posts-group-top{background:rgba(132,209,235,0.04);border:1px solid rgba(132,209,235,0.1)}
.posts-group-worst{background:rgba(240,89,36,0.04);border:1px solid rgba(240,89,36,0.1)}
.posts-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.posts-group-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.posts-group-title-top{color:var(--blue)}
.posts-group-title-worst{color:var(--muted)}
.top-post-dateline{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.acct-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.acct-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.acct-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;font-weight:700}
.acct-val{font-size:22px;font-weight:800;color:var(--beige);letter-spacing:-.03em;line-height:1}
.acct-sub{font-size:10px;color:var(--muted);margin-top:3px}
.acct-pos{color:#34d399}.acct-neg{color:#f05924}
.acct-empty{background:var(--surface2);border:1px dashed rgba(255,255,255,.1);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;text-align:center;font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--beige);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
tr.top-row td{background:rgba(240,89,36,.04)}
.num{text-align:right!important}
.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.badge-c{background:rgba(132,209,235,.12);color:#84d1eb}
.badge-r{background:rgba(240,89,36,.12);color:#f07a55}
.badge-i{background:rgba(252,246,236,.08);color:rgba(252,246,236,.55)}
.badge-s{background:rgba(196,176,253,.12);color:#c4b0fd}
.eng-pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.eng-h{background:rgba(240,89,36,.15);color:var(--orange)}
.eng-m{background:rgba(132,209,235,.12);color:var(--blue)}
.eng-l{color:var(--muted)}
.star{color:var(--orange);margin-right:4px;font-size:10px}
.desc-cell{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dimmed)}
.ig-link{color:var(--blue);text-decoration:none;font-size:11px;font-weight:600}
.ig-link:hover{opacity:.7}
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.ms-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:border-color .15s}
.ms-card:hover{border-color:rgba(240,89,36,.3)}
.ms-name{font-size:13px;font-weight:700;color:var(--beige);margin-bottom:6px}
.ms-views{font-size:22px;font-weight:800;color:var(--beige);letter-spacing:-.03em}
.ms-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:8px}
.ms-row{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.ms-val{font-weight:700;color:var(--beige)}
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:.75rem;text-align:center}
.empty-wrap .et{font-size:16px;font-weight:700;color:var(--beige)}
.empty-wrap p{color:var(--muted);font-size:13px;max-width:340px;line-height:1.6}
code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:12px}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.annual-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:.75rem;gap:.25rem;border-right:none;border-bottom:1px solid var(--border)}.sidebar-logo{padding:0 .75rem .75rem;border-bottom:none;margin-bottom:0}.sidebar-section{display:none}.nav-tab{padding:6px 12px;border-radius:99px;border:1px solid var(--border)}.nav-tab.active{background:rgba(240,89,36,.12);border-color:rgba(240,89,36,.3)}.nav-tab.active::before{display:none}.sidebar-footer{display:none}.main{padding:1rem}.kpi-grid{grid-template-columns:repeat(2,1fr)}.top-posts{grid-template-columns:1fr 1fr}.annual-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app-loading"><div class="spinner"></div><p>Carregando dados...</p></div>
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo.png" alt="SetUp"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="logo-fallback">SetUp</span>
      </div>
      <div class="sidebar-section">Mensal</div>
      <div id="monthNav"></div>
      <button class="nav-tab" id="btn-annual">
        <span class="nav-dot" style="background:var(--orange)"></span>Visão Anual
      </button>
      <div class="sidebar-footer">
        <div class="temeron-badge">
          <img class="temeron-logo" src="temeron-logo.png" alt="Temeron"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="temeron-t" style="display:none">T</div>
          <div>
            <div class="temeron-name">Temeron<sup style="font-size:9px">®</sup></div>
            <div class="temeron-rights">© 2026 Temeron. Todos os direitos reservados.</div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main" id="mainContent"></main>
  </div>
</div>
<script>
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WEEKDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function parsePostDate(s){
  if(!s)return null;
  const parts=s.trim().split(' ');
  const p=(parts[0]||'').split('/');
  if(p.length<3)return null;
  
  const rawTime=parts[1]||'00:00';
  const[hStr,mStr]=(rawTime+':00').split(':');
  let h=parseInt(hStr,10),m=parseInt(mStr,10);
  
  const dateBRT=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]),h+5,m);
  const hFmt=String(dateBRT.getHours()).padStart(2,'0');
  const mFmt=String(dateBRT.getMinutes()).padStart(2,'0');
  
  return{date:dateBRT,time:`${hFmt}:${mFmt}`};
}

function postDateLine(s){
  const r=parsePostDate(s);
  if(!r)return'';
  const{date,time}=r;
  return`${WEEKDAYS[date.getDay()]} · ${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')} · ${time}`;
}

const MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const fmt=n=>(isNaN(n)||n==null)?'—':Number(n).toLocaleString('pt-BR');

function fmtD(s){
  const r=parsePostDate(s);
  if(!r)return'—';
  return `${String(r.date.getDate()).padStart(2,'0')}/${String(r.date.getMonth()+1).padStart(2,'0')}/${String(r.date.getFullYear()).slice(-2)} às ${r.time}`;
}

function sDate(s){
  const r=parsePostDate(s);
  if(!r)return'—';
  return `${String(r.date.getDate()).padStart(2,'0')} ${MS[r.date.getMonth()]}`;
}

function tKey(t){const s=(t||'').toLowerCase();if(s.includes('carrossel'))return'c';if(s.includes('reel'))return'r';if(s.includes('story')||s.includes('storie'))return's';return'i'}
function sTipo(t){return{c:'Carrossel',r:'Reel',i:'Imagem',s:'Story'}[tKey(t)]}
function bCls(t){return{c:'badge-c',r:'badge-r',i:'badge-i',s:'badge-s'}[tKey(t)]}
function bColor(t){return{c:'#84d1eb',r:'#f05924',i:'rgba(252,246,236,.3)',s:'#c4b0fd'}[tKey(t)]}
function pCls(t){return{c:'pill-c',r:'pill-r',i:'pill-i',s:'pill-s'}[tKey(t)]}
function ePill(p){if(p>=5)return`<span class="eng-pill eng-h">${p.toFixed(1)}%</span>`;if(p>=2)return`<span class="eng-pill eng-m">${p.toFixed(1)}%</span>`;return`<span class="eng-l">${p.toFixed(1)}%</span>`}
function sc(url){if(!url)return null;const m=url.match(/\/(?:p|reel)\/([A-Za-z0-9_-]+)/);return m?m[1]:null}
function sum(arr,k){return arr.reduce((a,r)=>a+(parseInt(r[k],10)||0),0)}
function parsePosts(rows){return rows.filter(r=>(r['Data']||'').trim()==='Total')}

const charts={};
function mkChart(id,cfg){if(charts[id])charts[id].destroy();const el=document.getElementById(id);if(el)charts[id]=new Chart(el,cfg)}

const chartOpts=(type='bar')=>({
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e1820',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#fcf6ec',bodyColor:'#7a6e78',titleFont:{family:"'Bricolage Grotesque',sans-serif",weight:'700'},bodyFont:{family:"'Bricolage Grotesque',sans-serif"}}},
  scales:{x:{grid:{display:false},ticks:{color:'#7a6e78',font:{size:11,family:"'Bricolage Grotesque',sans-serif"}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#7a6e78',font:{size:11,family:"'Bricolage Grotesque',sans-serif"},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}}}
});

function imgBlock(shortcode,postUrl){
  if(!shortcode)return`<div class="top-post-ph"><div class="top-post-ph-icon">📷</div><div>Sem imagem</div></div>`;
  const embedUrl=(postUrl||'').replace(/\/?$/,'/');
  return`<img class="top-post-img" src="posts/${shortcode}.jpg"
    onerror="this.src='posts/${shortcode}.png';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='block'}" alt="">
    <div class="top-post-embed" style="display:none">
      <iframe src="${embedUrl}embed/" frameborder="0" scrolling="no" allowtransparency="true" loading="lazy"></iframe>
    </div>`;
}

function topPostsHtml(top3,label='do mês'){
  return top3.map((p,i)=>{
    const code=sc(p['Link permanente']||'');
    const v=parseInt(p['Visualizações'],10)||0;
    const l=parseInt(p['Curtidas'],10)||0,sh=parseInt(p['Compartilhamentos'],10)||0,co=parseInt(p['Comentários'],10)||0,sv=parseInt(p['Salvamentos'],10)||0;
    const eng=v>0?(l+sh+co+sv)/v*100:0;
    const desc=(p['Descrição']||'').split('\n')[0].trim();
    const url=p['Link permanente']||'#';
    return`<a class="top-post-card" href="${url}" target="_blank" rel="noopener">
      ${imgBlock(code,url)}
      <div class="top-post-body">
        <div class="top-post-rank">${['1º','2º','3º'][i]} ${label} · ${fmt(v)} views</div>
        <div class="top-post-dateline">${postDateLine(p['Horário de publicação'])}</div>
        <div class="top-post-desc">${desc}</div>
        <div class="top-post-stats">${fmt(l)} <span>curtidas</span> &nbsp; ${ePill(eng)}</div>
      </div></a>`;
  }).join('');
}

function worstPostsHtml(posts3){
  return posts3.map((p,i)=>{
    const code=sc(p['Link permanente']||'');
    const v=parseInt(p['Visualizações'],10)||0;
    const l=parseInt(p['Curtidas'],10)||0,sh=parseInt(p['Compartilhamentos'],10)||0,co=parseInt(p['Comentários'],10)||0,sv=parseInt(p['Salvamentos'],10)||0;
    const eng=v>0?(l+sh+co+sv)/v*100:0;
    const desc=(p['Descrição']||'').split('\n')[0].trim();
    const url=p['Link permanente']||'#';

function tableHtml(sorted,best){
  return sorted.map(p=>{
    const v=parseInt(p['Visualizações'],10)||0,l=parseInt(p['Curtidas'],10)||0,sh=parseInt(p['Compartilhamentos'],10)||0,co=parseInt(p['Comentários'],10)||0,sv=parseInt(p['Salvamentos'],10)||0;
    const eng=v>0?(l+sh+co+sv)/v*100:0;
    const isBest=p===best;

}

let currentView=null;
let chronoMap={};
let allMonths=[];

function showView(vid){
  if(currentView===vid)return;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const view=document.getElementById(vid);
  if(view)view.classList.add('active');
  const tab=document.querySelector(`[data-view="${vid}"]`);
  if(tab)tab.classList.add('active');
  currentView=vid;
  const multiYear=[...new Set(allMonths.map(m=>m.year))].length>1;
  if(vid.startsWith('view-')&&!vid.startsWith('view-annual')){
    const key=vid.replace('view-','');
    if(chronoMap[key]){
      mkChart(`ch-${key}`,{type:'bar',data:{labels:chronoMap[key].map(p=>sDate(p['Horário de publicação'])),datasets:[{data:chronoMap[key].map(p=>parseInt(p['Visualizações'],10)||0),backgroundColor:chronoMap[key].map(p=>bColor(p['Tipo de post'])),borderRadius:5,borderSkipped:false}]},options:{...chartOpts(),plugins:{...chartOpts().plugins,tooltip:{...chartOpts().plugins.tooltip,callbacks:{label:ctx=>' '+ctx.parsed.y.toLocaleString('pt-BR')+' views'}}}}});
    }
  } else if(vid.startsWith('view-annual-')){
    const y=parseInt(vid.replace('view-annual-',''));
    const yMonths=allMonths.filter(m=>m.year===y);
    mkChart(`ch-annual-${y}`,{type:'bar',data:{labels:yMonths.map(m=>MO[m.mi].slice(0,3)),datasets:[{label:'Views',data:yMonths.map(m=>sum(m.posts,'Visualizações')),backgroundColor:'#f05924',borderRadius:5,borderSkipped:false},{label:'Alcance',data:yMonths.map(m=>sum(m.posts,'Alcance')),backgroundColor:'#84d1eb',borderRadius:4,borderSkipped:false}]},options:{...chartOpts(),plugins:{...chartOpts().plugins,tooltip:{...chartOpts().plugins.tooltip}}}});
    if(window.acctMap) {
        const follData = yMonths.map(m => {
            const acct = window.acctMap[m.key];
            return acct ? (parseFloat(acct['Total seguidores']) || null) : null;
        });
        if (follData.some(d => d !== null)) {
            mkChart(`ch-annual-foll-${y}`, {
                type: 'line',
                data: {
                    labels: yMonths.map(m=>MO[m.mi].slice(0,3)),
                    datasets: [{
                        label: 'Total de Seguidores',
                        data: follData,
                        borderColor: '#34d399',
                        backgroundColor: 'rgba(52, 211, 153, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#34d399',
                        pointBorderColor: '#161218',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {...chartOpts('line'), plugins: {...chartOpts().plugins, tooltip: {...chartOpts().plugins.tooltip, callbacks: {label: ctx => ' ' + ctx.parsed.y.toLocaleString('pt-BR') + ' seguidores'}}}}
            });
        }
    }
  }
}

(async function init(){
  const now=new Date();
  const thisYear=now.getFullYear();
  const candidates=[];
  [thisYear-1,thisYear].forEach(y=>{
    for(let i=0;i<12;i++){
      candidates.push({year:y,mi:i,key:`${y}-${String(i+1).padStart(2,'0')}`});
    }
  });
  
  // 1. Fetch Posts Data (same as before)
  const fetches=candidates.map(({year,mi,key})=>{
    return fetch(`data/${key}.csv`).then(r=>r.ok?r.text():null).catch(()=>null)
      .then(text=>{
        if(!text)return null;
        const posts=parsePosts(Papa.parse(text,{header:true,skipEmptyLines:true}).data);
        return posts.length?{mi,year,key,posts}:null;
      });
  });
  const raw=(await Promise.all(fetches)).filter(Boolean);
  const seen=new Set();
  const results=raw.filter(m=>{if(seen.has(m.key))return false;seen.add(m.key);return true;});
  results.sort((a,b)=>a.key.localeCompare(b.key));
  
  if(!results.length){
    document.getElementById('app-loading').innerHTML=`<div class="empty-wrap"><div class="et">Nenhum dado encontrado</div><p>Suba os arquivos CSV na pasta <code>data/</code> com o formato <code>${thisYear}-03.csv</code></p></div>`;
    return;
  }

  // 2. Fetch General Account Data (NEW LOGIC)
  const years=[...new Set(results.map(m=>m.year))].sort();
  const acctMap={};
  try {
      const res = await fetch('data/dados_gerais.xlsx');
      if(res.ok) {
          const ab = await res.arrayBuffer();
          const workbook = XLSX.read(ab, {type: 'array'});
          workbook.SheetNames.forEach(sheetName => {
              const y = parseInt(sheetName, 10);
              if(isNaN(y)) return;
              const worksheet = workbook.Sheets[sheetName];
              const data = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
              data.forEach(row => {
                  if(!row['Mês']) return;
                  const monthName = row['Mês'].trim().toLowerCase();
                  const mi = MO.findIndex(m => m.toLowerCase() === monthName);
                  if(mi !== -1) {
                      const key = `${y}-${String(mi+1).padStart(2,'0')}`;
                      acctMap[key] = row;
                  }
              });
          });
      } else {
          console.error("Arquivo Excel não encontrado.");
      }
  } catch(e) {
      console.error("Erro na leitura do Excel:", e);
  }

  allMonths=results;
  const multiYear=years.length>1;
  const nav=document.getElementById('monthNav');
  years.forEach(y=>{
    const yDiv=document.createElement('div');yDiv.className='sidebar-section';yDiv.textContent=String(y);nav.appendChild(yDiv);
    results.filter(m=>m.year===y).forEach(m=>{
      const btn=document.createElement('button');btn.className='nav-tab';btn.dataset.view=`view-${m.key}`;
      btn.innerHTML=`<span class="nav-dot" style="background:${bColor(m.posts[0]?.['Tipo de post']||'')}"></span>${MO[m.mi]}`;
      btn.onclick=()=>showView(`view-${m.key}`);nav.appendChild(btn);
    });
  });
  
  const geralSection=document.createElement('div');geralSection.className='sidebar-section';geralSection.textContent='Geral';
  document.querySelector('.sidebar').insertBefore(geralSection,document.getElementById('btn-annual'));
  years.forEach(y=>{
    const btn=document.createElement('button');btn.className='nav-tab';btn.dataset.view=`view-annual-${y}`;
    btn.innerHTML=`<span class="nav-dot" style="background:var(--orange)"></span>${y}`;
    btn.onclick=()=>showView(`view-annual-${y}`);
    document.querySelector('.sidebar').insertBefore(btn,document.getElementById('btn-annual'));
  });
  document.getElementById('btn-annual').style.display='none';
  window.acctMap = acctMap;
  let html='';
  results.forEach(m=>{const b=buildMonth(m.mi,m.posts,m.key,m.year,multiYear,acctMap[m.key]||null);html+=b.html;chronoMap[m.key]=b.chrono;});
  const byYear={};
  results.forEach(m=>{if(!byYear[m.year])byYear[m.year]=[];byYear[m.year].push(m);});
  years.forEach(y=>{html+=buildAnnual(byYear[y],y);});
  document.getElementById('mainContent').innerHTML=html;
  document.getElementById('app-loading').style.display='none';
  document.getElementById('app').style.display='block';
  showView(`view-annual-${years[years.length-1]}`);
})();
</script>
<script>
(function(){
  const img=new Image();
  img.onload=function(){
    const c=document.createElement('canvas');
    c.width=64;c.height=64;
    const ctx=c.getContext('2d');
    ctx.beginPath();ctx.arc(32,32,32,0,Math.PI*2);ctx.closePath();ctx.clip();
    ctx.drawImage(img,0,0,64,64);
    const link=document.querySelector("link[rel='icon']")||document.createElement('link');
    link.rel='icon';link.href=c.toDataURL('image/png');
    document.head.appendChild(link);
  };
  img.src='favicon.png';
})();
</script>
</body>
